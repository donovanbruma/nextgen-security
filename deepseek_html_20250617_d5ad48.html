<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Security - Coming Soon</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #333;
        }
        
        .container {
            text-align: center;
            padding: 30px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 1;
            max-width: 80%;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        
        .construction-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-30px);}
            60% {transform: translateY(-15px);}
        }
        
        .tools {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .tool {
            font-size: 2rem;
            animation: spin 4s linear infinite;
            animation-delay: calc(var(--delay) * 0.2s);
        }
        
        @keyframes spin {
            0% {transform: rotate(0deg);}
            100% {transform: rotate(360deg);}
        }
        
        .progress-bar {
            height: 20px;
            background-color: #ecf0f1;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .progress {
            height: 100%;
            width: 0%;
            background-color: #3498db;
            border-radius: 10px;
            animation: progress 5s infinite;
        }
        
        @keyframes progress {
            0% {width: 0%;}
            50% {width: 80%;}
            100% {width: 100%;}
        }
        
        .bubble {
            position: absolute;
            background-color: rgba(52, 152, 219, 0.1);
            border-radius: 50%;
            animation: float linear infinite;
        }
        
        @keyframes float {
            0% {transform: translateY(0) rotate(0deg); opacity: 1;}
            100% {transform: translateY(-1000px) rotate(720deg); opacity: 0;}
        }
        
        .contact {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px dashed #3498db;
        }
        
        .contact-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        
        .contact-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .contact-link {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            padding: 10px 15px;
            border-radius: 30px;
            background-color: rgba(52, 152, 219, 0.1);
        }
        
        .contact-link:hover {
            background-color: #3498db;
            color: white;
            transform: scale(1.05);
        }
        
        .contact-icon {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="construction-icon">🚧</div>
        <h1>Under Construction</h1>
        <p>We bouwen aan een veiligere digitale toekomst! Onze website is bijna klaar.</p>
        
        <div class="tools">
            <div class="tool" style="--delay: 1;">🔨</div>
            <div class="tool" style="--delay: 2;">🛠️</div>
            <div class="tool" style="--delay: 3;">⚙️</div>
            <div class="tool" style="--delay: 4;">🔧</div>
        </div>
        
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
        
        <div class="contact">
            <div class="contact-title">📡 Blijf met ons verbonden!</div>
            <p>We zijn bereikbaar via deze kanalen:</p>
            
            <div class="contact-links">
                <a href="mailto:info@nextgen-security.nl" class="contact-link">
                    <span class="contact-icon">✉️</span>
                    <span>info@nextgen-security.nl</span>
                </a>
                
                <a href="https://www.instagram.com/Next_gensecurity" target="_blank" class="contact-link">
                    <span class="contact-icon">📸</span>
                    <span>@Next_gensecurity</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Create bubbles for background
        function createBubbles() {
            const body = document.body;
            const bubbleCount = 20;
            
            for (let i = 0; i < bubbleCount; i++) {
                const bubble = document.createElement('div');
                bubble.classList.add('bubble');
                
                // Random size between 10 and 100px
                const size = Math.random() * 90 + 10;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                
                // Random position
                bubble.style.left = `${Math.random() * 100}vw`;
                bubble.style.bottom = `-${size}px`;
                
                // Random animation duration between 10 and 30s
                const duration = Math.random() * 20 + 10;
                bubble.style.animationDuration = `${duration}s`;
                
                // Random delay
                bubble.style.animationDelay = `${Math.random() * 5}s`;
                
                body.appendChild(bubble);
            }
        }
        
        // Call the function when the page loads
        window.onload = createBubbles;
    </script>
</body>
</html>
